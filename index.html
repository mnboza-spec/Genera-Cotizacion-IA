          <div>
            <h1>GEMSA Cotizador IA</h1>
            <p>GEMSA CORPORACIÓN SAC · Cotizaciones profesionales para servicios generales y mantenimiento retail</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="btn-ghost" id="newQuoteBtn" title="Limpiar y crear una nueva cotización">Nueva cotización</button>
          <button class="btn-ghost" id="saveBtn" title="Descargar archivo editable">Guardar archivo</button>
          <button class="btn-ghost" id="openBtn" title="Abrir archivo editable">Abrir archivo</button>
          <button class="btn-ghost" id="previewBtn" title="Actualizar vista previa">Vista PDF</button>
          <button class="btn-primary" id="printBtn" title="Exportar como PDF desde imprimir">Exportar PDF</button>
          <input id="openFileInput" type="file" accept=".gemsa.json,application/json" hidden>
        </div>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <nav class="tabs" aria-label="Secciones">
          <button class="tab active" data-tab="crear">Crear</button>
          <button class="tab" data-tab="catalogo">Catálogo</button>
        </nav>

        <section class="panel tab-view active" id="tab-crear">
          <div class="panel-header">
            <h2 class="panel-title">Detalles</h2>
          </div>
          <div class="grid-2">
            <label>Cliente
              <input id="clientName" placeholder="Nombre del cliente">
            </label>
            <label>Contacto
              <input id="contactName" placeholder="Nombre del contacto">
            </label>
          </div>
          <label>Nombre del proyecto
            <input id="projectName" placeholder="Ej.: Mantenimiento tienda retail">
          </label>
          <label>Detalles del proyecto
            <textarea id="contextInput" placeholder="Escribe los detalles como un prompt para IA: necesidad, ambiente, problema, ubicación, horarios, restricciones, medidas aproximadas y cualquier indicio de las fotos."></textarea>
            <button id="btnAudioRecord" type="button" style="margin-top: 8px; align-self: flex-start;">🎤 Grabar Audio (Whisper)</button>
          </label>
          <datalist id="clientOptions"></datalist>
          <datalist id="contactOptions"></datalist>
          <div class="file-zone">
            <label>Fotos y PDFs del proyecto
              <input id="photoInput" type="file" accept="image/*,application/pdf" multiple>
            </label>
            <div class="thumbs" id="photoGrid"></div>
          </div>
          <button class="btn-primary" id="generateBtn">Generar IA</button>
          <div class="ai-status" id="aiStatus"><span><i class="status-dot"></i>Listo para generar la cotización con los detalles y el archivo.</span></div>
        </section>

        <section class="panel tab-view" id="tab-catalogo">
          <div class="panel-header">
            <h2 class="panel-title">Catálogo</h2>
            <button class="icon-btn" id="addCatalogBtn" title="Agregar partida">+</button>
          </div>
          <div class="catalog-list" id="catalogList"></div>
        </section>

        <section class="panel tab-view" id="tab-ia" style="display: none;">
          <h2 class="panel-title">IA con OpenAI</h2>
          <label>Tipo de conexión
            <select id="aiProvider">
              <option value="openai" selected>OpenAI (Recomendado)</option>
              <option value="openrouter">OpenRouter pago directo</option>
              <option value="proxy">Backend propio para producción</option>
              <option value="openai-compatible">OpenAI compatible genérico</option>
              <option value="gemini">Google Gemini</option>
              <option value="local">Motor local sin internet</option>
            </select>
          </label>
          <label>Endpoint IA
            <input id="aiEndpoint" placeholder="https://openrouter.ai/api/v1/chat/completions">
          </label>
          <label>Modelo
            <input id="modelName" placeholder="Ej.: openai/gpt-4.1-mini o el modelo activo en OpenRouter">
          </label>
          <label>API key de OpenRouter
            <input id="apiKey" type="password" placeholder="sk-or-v1-...">
          </label>
          <label>Modo de precios
            <select id="priceMode">
              <option value="referencial">Referencial conservador</option>
              <option value="premium">Premium corporativo</option>
              <option value="ajustado">Ajustado competitivo</option>
            </select>
          </label>
          <label>Formato de respuesta
            <input value='JSON: {"groups":[{"title":"","items":[{"title":"","description":"","unit":"","qty":1,"price":0,"photoIndex":""}]}]}' readonly>
          </label>
          <button id="testAiBtn">Probar conexión IA</button>
          <div class="ai-status">Sistema pago con OpenRouter: carga saldo en tu cuenta, pega tu API key y selecciona un modelo con soporte de texto o visión. Para uso comercial estable, puedes mantener OpenRouter en un backend propio y no exponer la clave en el navegador.</div>
        </section>

        <section class="panel tab-view" id="tab-config" style="display: none;">
          <h2 class="panel-title">Configuración</h2>
          <label>Número de cotización
            <input id="quoteNumber">
          </label>
          <label>Fecha
            <input id="quoteDate" type="date">
          </label>
          <div class="grid-2">
            <label>IGV %
              <input id="taxRate" type="number" min="0" step="0.01" value="18">
            </label>
            <label>Validez
              <input id="validity" placeholder="7 días">
            </label>
          </div>
          <div class="grid-2">
            <label>Forma de pago
              <input id="paymentTerms" placeholder="Crédito a 15 días">
            </label>
            <label>Entrega
              <input id="deliveryTime" placeholder="10 días hábiles">
            </label>
          </div>
          <label>Firma
            <input id="signer" placeholder="Área Comercial GEMSA">
          </label>
          <label>Condiciones
            <textarea id="terms"></textarea>
          </label>
        </section>
      </aside>

      <section class="main">
        <section class="quote-editor" id="quoteEditor">
          <div class="panel-header">
            <h2 class="panel-title">Partidas</h2>
            <div class="top-actions">
              <button id="addGroupBtn">Grupo</button>
              <button id="addItemBtn">Partida</button>
            </div>
          </div>
          <div id="groups"></div>
          <div class="summary">
            <div class="summary-row"><span>Subtotal</span><b id="subtotalText">S/ 0.00</b></div>
            <div class="summary-row"><span>IGV</span><b id="taxText">S/ 0.00</b></div>
            <div class="summary-row"><span>Total</span><strong id="totalText">S/ 0.00</strong></div>
          </div>
        </section>

        <section class="preview-sheet" id="previewSheet"></section>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
